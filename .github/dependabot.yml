version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies

  # Keep npm/pnpm dependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    # Group all non-major updates together to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
